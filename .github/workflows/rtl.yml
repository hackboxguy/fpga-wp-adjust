name: RTL

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Verilog tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog yosys

      - name: Install Python validation tools
        run: python3 -m pip install jsonschema

      - name: Validate calibration examples
        run: make validate-json

      - name: Run directed simulation
        run: make test

      - name: Run synthesis sanity check
        run: make synth-check
